<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>내 모임 결과 — 남산엔테이블</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #000; color: #fff; min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 1.5rem 1.25rem 5rem; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 16px; padding: 1.25rem; margin-bottom: 12px; }
    .card-title { font-size: 11px; font-weight: 700; color: #555;
                  letter-spacing: 1.5px; margin-bottom: 10px; }
    .loading { text-align: center; padding: 4rem 2rem; color: #555; font-size: 15px; }
    .error   { text-align: center; padding: 4rem 2rem; }

    .header-card { background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
                   border: 1px solid #534AB7; border-radius: 20px;
                   padding: 1.75rem 1.5rem; margin-bottom: 12px; text-align: center; }
    .header-logo { font-size: 13px; color: #534AB7; font-weight: 700;
                   letter-spacing: 2px; margin-bottom: 8px; }
    .header-title { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .header-sub { font-size: 13px; color: #666; }

    .big-num { font-size: 48px; font-weight: 900; color: #CCFF00;
               line-height: 1; text-align: center; padding: 0.5rem 0; }
    .big-num-sub { font-size: 13px; color: #555; text-align: center; margin-top: 4px; }

    .match-item { display: flex; align-items: center; justify-content: space-between;
                  padding: 10px 0; border-bottom: 1px solid #222; }
    .match-item:last-child { border-bottom: none; }
    .match-rank { font-size: 18px; width: 28px; flex-shrink: 0; }
    .match-name { font-size: 15px; font-weight: 700; color: #fff; flex: 1; padding: 0 10px; }
    .match-score { font-size: 14px; font-weight: 700; color: #CCFF00; }

    .tendency-row { display: flex; align-items: center; justify-content: space-between;
                    padding: 8px 0; border-bottom: 1px solid #1e1e1e; }
    .tendency-row:last-child { border-bottom: none; }
    .tendency-category { font-size: 11px; color: #555; width: 60px;
                         flex-shrink: 0; font-weight: 600; }
    .tendency-label { font-size: 13px; color: #fff; flex: 1; padding: 0 8px; }
    .tendency-choice { font-size: 11px; font-weight: 700; padding: 2px 8px;
                       border-radius: 999px; flex-shrink: 0; }
    .choice-a { background: #1a2a1a; color: #CCFF00; border: 1px solid #CCFF00; }
    .choice-b { background: #2a1a1a; color: #ff7043; border: 1px solid #ff7043; }

    .arrow-match { background: #1a1a2e; border: 1px solid #534AB7;
                   border-radius: 12px; padding: 1rem; text-align: center; }
    .arrow-match-name { font-size: 22px; font-weight: 800; color: #AFA9EC; margin-top: 6px; }

    .share-area { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
                  width: 100%; max-width: 480px;
                  padding: 12px 16px 28px;
                  background: linear-gradient(transparent, #000 40%);
                  display: flex; gap: 8px; z-index: 100; }
    .share-btn { flex: 1; padding: 14px; border-radius: 12px; border: none;
                 font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .share-btn:active { opacity: 0.8; }
    .btn-save  { background: #CCFF00; color: #000; }
    .btn-share { background: #1a1a1a; border: 1px solid #333; color: #fff; }

    .watermark { text-align: center; padding: 1rem 0 0.5rem;
                 font-size: 12px; color: #333; }
    .watermark span { color: #534AB7; font-weight: 600; }

    /* ── AI 연애 유형 분석 ── */
    .personality-section { background:linear-gradient(135deg,#1a1a2e,#0d0d1a); border:1px solid #534AB7; border-radius:20px; padding:1.5rem; margin-bottom:12px; position:relative; overflow:hidden; }
    .personality-section::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 60% 40%,rgba(83,74,183,0.15) 0%,transparent 60%); pointer-events:none; }
    .personality-loading { display:flex; flex-direction:column; align-items:center; gap:12px; padding:2rem 0; }
    .personality-skeleton { background:linear-gradient(90deg,#1e1e1e 25%,#2a2a2a 50%,#1e1e1e 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
    @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
    .personality-result { display:none; }
    .personality-emoji { font-size:72px; text-align:center; margin-bottom:8px; line-height:1; }
    .personality-type-name { font-size:28px; font-weight:900; color:#fff; text-align:center; margin-bottom:4px; letter-spacing:-0.5px; }
    .personality-subtitle { font-size:14px; color:#AFA9EC; text-align:center; margin-bottom:1.25rem; }
    .personality-analysis { font-size:14px; color:#aaa; line-height:1.8; background:rgba(0,0,0,0.3); border-radius:12px; padding:1rem; margin-bottom:1rem; }
    .personality-compatible { display:flex; align-items:center; gap:8px; background:rgba(83,74,183,0.15); border:1px solid rgba(83,74,183,0.4); border-radius:10px; padding:10px 14px; margin-bottom:1.25rem; }
    .compatible-label { font-size:11px; color:#534AB7; font-weight:700; flex-shrink:0; }
    .compatible-name { font-size:15px; font-weight:700; color:#AFA9EC; }
    .card-preview-wrap { display:flex; justify-content:center; margin-bottom:1rem; }
    .card-preview-wrap svg { border-radius:16px; box-shadow:0 8px 32px rgba(83,74,183,0.3); max-width:200px; height:auto; }
    .card-share-row { display:flex; gap:8px; }
    .card-save-btn { flex:1; padding:13px; border:none; border-radius:12px; background:#534AB7; color:#fff; font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s; }
    .card-save-btn:active { opacity:0.8; }
    .card-share-btn { flex:1; padding:13px; border-radius:12px; border:1px solid #534AB7; background:transparent; color:#AFA9EC; font-size:14px; font-weight:700; cursor:pointer; transition:opacity 0.15s; }
    .personality-error { text-align:center; color:#555; font-size:13px; padding:1rem 0; }
  </style>
</head>
<body>

<div id="loading" class="loading">
  <div style="font-size:32px;margin-bottom:1rem;">⏳</div>
  결과를 불러오는 중...
</div>

<div id="error" class="error" style="display:none;">
  <div style="font-size:48px;margin-bottom:1rem;">😢</div>
  <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:8px;">결과를 찾을 수 없어요</div>
  <div style="font-size:13px;color:#555;">링크가 만료되었거나 잘못된 주소예요</div>
</div>

<div id="result-content" style="display:none;">
  <div class="container" id="capture-area">

    <div class="header-card">
      <div class="header-logo">NAMSAN NTABLE</div>
      <div class="header-title" id="res-title">남산엔테이블</div>
      <div class="header-sub" id="res-date">-</div>
    </div>

    <div class="card">
      <div class="card-title">💫 첫인상 투표</div>
      <div class="big-num" id="fi-count">0</div>
      <div class="big-num-sub">명이 나를 첫인상으로 선택했어요</div>
    </div>

    <div class="card" id="arrow-card">
      <div class="card-title">💘 사랑의 작대기</div>
      <div id="arrow-content"></div>
    </div>

    <div class="card">
      <div class="card-title">💗 연애 성향 베스트 매칭</div>
      <div id="match-list"></div>
    </div>

    <div class="card">
      <div class="card-title">🔍 나의 연애 성향</div>
      <div id="tendency-list"></div>
    </div>

    <!-- AI 연애 유형 분석 -->
    <div class="personality-section" id="personality-section">
      <div class="card-title">🤖 AI 연애 유형 분석</div>
      <div class="personality-loading" id="personality-loading">
        <div class="personality-skeleton" style="width:60px;height:60px;border-radius:50%;"></div>
        <div class="personality-skeleton" style="width:120px;height:24px;"></div>
        <div class="personality-skeleton" style="width:160px;height:14px;"></div>
        <div class="personality-skeleton" style="width:100%;height:80px;border-radius:12px;"></div>
      </div>
      <div class="personality-result" id="personality-result">
        <div class="card-preview-wrap"><div id="personality-svg-wrap"></div></div>
        <div class="personality-emoji" id="personality-emoji"></div>
        <div class="personality-type-name" id="personality-type-name"></div>
        <div class="personality-subtitle" id="personality-subtitle"></div>
        <div class="personality-analysis" id="personality-analysis"></div>
        <div class="personality-compatible">
          <span class="compatible-label">💕 잘 맞는 유형</span>
          <span class="compatible-name" id="compatible-name"></span>
        </div>
        <div class="card-share-row no-capture">
          <button class="card-save-btn" onclick="savePersonalityCard()">📸 카드 저장</button>
          <button class="card-share-btn" onclick="sharePersonalityCard()">공유하기</button>
        </div>
      </div>
      <div class="personality-error" id="personality-error" style="display:none;">
        분석을 불러오지 못했어요.<br>
        <button onclick="loadPersonality()" style="margin-top:8px;padding:6px 16px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#aaa;font-size:12px;cursor:pointer;">다시 시도</button>
      </div>
    </div>

    <div class="watermark">
      남산엔테이블 <span>@ntable.namsan</span>
    </div>

  </div>
</div>

<div class="share-area" id="share-area" style="display:none;">
  <button class="share-btn btn-save" onclick="saveImage()">📸 이미지 저장</button>
  <button class="share-btn btn-share" onclick="shareResult()">🔗 공유하기</button>
</div>

<script>
const LABELS = [
  { 남: { a: '천천히 가까워지는 편', b: '먼저 적극적으로 다가가는 편' },
    여: { a: '천천히 가까워지는 편', b: '적극적으로 다가오는 스타일 선호' } },
  { 남: { a: '자주 연락하는 편', b: '각자 생활 존중하는 편' },
    여: { a: '자주 연락하는 편', b: '적당히 연락하는 편' } },
  { 남: { a: '계획파', b: '즉흥파' },
    여: { a: '계획해주는 상대 선호', b: '즉흥 데이트 선호' } },
  { 남: { a: '말로 자주 표현하는 편', b: '행동으로 표현하는 편' },
    여: { a: '말로 표현하는 상대 선호', b: '행동으로 보여주는 상대 선호' } },
  { 남: { a: '홈데이트파', b: '액티브 데이트파' },
    여: { a: '홈데이트파', b: '액티브 데이트파' } },
  { 남: { a: '나한테만 특별한 편', b: '모두에게 친절한 편' },
    여: { a: '츤데레 스타일 선호', b: '모두에게 친절한 상대 선호' } },
  { 남: { a: '질투하는 편', b: '질투 안 하는 편' },
    여: { a: '질투받는 걸 좋아함', b: '자유로운 관계 선호' } },
  { 남: { a: '바로 풀고 싶은 편', b: '시간 두고 해결하는 편' },
    여: { a: '바로 풀고 싶은 편', b: '시간 두고 해결하는 편' } },
  { 남: { a: '함께하는 취미 지향', b: '각자 시간 존중' },
    여: { a: '함께하는 취미 지향', b: '각자 시간 존중' } },
  { 남: { a: '스킨십 중시', b: '깊은 대화 중시' },
    여: { a: '스킨십 중시', b: '깊은 대화 중시' } },
  { 남: { a: '이벤트파', b: '평소에 잘 챙겨주는 스타일' },
    여: { a: '이벤트파', b: '평소에 잘 챙겨주는 스타일' } },
  { 남: { a: '빠른 진전 선호', b: '신중하게 천천히' },
    여: { a: '빠른 진전 선호', b: '신중하게 천천히' } },
  { 남: { a: '자주 만나는 연애 선호', b: '각자 생활 지키는 연애 선호' },
    여: { a: '자주 만나는 연애 선호', b: '각자 생활 지키는 연애 선호' } },
  { 남: { a: '주변 관계 중시', b: '둘만의 세계 중시' },
    여: { a: '주변 관계 중시', b: '둘만의 세계 중시' } },
  { 남: { a: '결혼에 적극적', b: '천천히 신중하게' },
    여: { a: '결혼에 적극적', b: '천천히 신중하게' } },
];

const PHASES = [
  '연애 스타일','연애 스타일','연애 스타일','연애 스타일','연애 스타일',
  '관계 탐구','관계 탐구','관계 탐구','관계 탐구','관계 탐구',
  '미래·가치관','미래·가치관','미래·가치관','미래·가치관','미래·가치관',
];

const params = new URLSearchParams(location.search);
const ROOM = params.get('room') || '';
const SUB  = params.get('sub')  || '';

async function load() {
  if (!ROOM || !SUB) { showError(); return; }
  try {
    const res  = await fetch('/api/result?room=' + encodeURIComponent(ROOM) + '&sub=' + encodeURIComponent(SUB));
    const data = await res.json();
    if (!data.ok) { showError(); return; }
    render(data);
  } catch(e) { showError(); }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = '';
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result-content').style.display = '';
  document.getElementById('share-area').style.display = 'flex';

  document.getElementById('res-title').textContent = (d.venue_name || '남산') + '엔테이블';
  var dateStr = d.date ? d.date.replace(/-/g, '.') : '';
  document.getElementById('res-date').textContent = dateStr ? dateStr + ' 모임 결과' : '모임 결과';

  document.getElementById('fi-count').textContent = d.fi_count || 0;

  var arrowEl = document.getElementById('arrow-content');
  if (d.arrow_matched_nick) {
    document.getElementById('arrow-card').style.display = '';
    arrowEl.innerHTML =
      '<div class="arrow-match">'
      + '<div style="font-size:32px;">💘</div>'
      + '<div class="arrow-match-name">' + d.arrow_matched_nick + '</div>'
      + '<div style="font-size:12px;color:#666;margin-top:6px;">서로 선택했어요!</div>'
      + '</div>';
  } else {
    document.getElementById('arrow-card').style.display = 'none';
  }

  var matchList = document.getElementById('match-list');
  var scores = d.match_scores || {};
  var sorted = Object.values(scores).sort(function(a, b) { return b.score - a.score; });
  var RANK_EMOJI = ['🥇','🥈','🥉','4위','5위','6위','7위','8위'];
  if (!sorted.length) {
    matchList.innerHTML = '<div style="color:#444;font-size:13px;text-align:center;padding:1rem;">매칭 데이터가 없어요</div>';
  } else {
    matchList.innerHTML = sorted.map(function(item, i) {
      return '<div class="match-item">'
        + '<span class="match-rank">' + (RANK_EMOJI[i] || (i+1)+'위') + '</span>'
        + '<span class="match-name">' + item.nickname + '</span>'
        + '<span class="match-score">' + item.score + '/15</span>'
        + '</div>';
    }).join('');
  }

  var votes = d.votes || {};
  var gender = d.gender || '남';
  var tendencyEl = document.getElementById('tendency-list');
  var tendencyRows = [];
  for (var qi = 0; qi < 15; qi++) {
    var choice = votes[String(qi)];
    if (!choice) continue;
    var labelObj = LABELS[qi];
    var genderLabel = labelObj[gender] || labelObj['남'];
    var label = genderLabel[choice];
    if (!label) continue;
    tendencyRows.push(
      '<div class="tendency-row">'
      + '<span class="tendency-category">' + PHASES[qi] + '</span>'
      + '<span class="tendency-label">' + label + '</span>'
      + '<span class="tendency-choice ' + (choice === 'a' ? 'choice-a' : 'choice-b') + '">'
      + choice.toUpperCase() + '</span>'
      + '</div>'
    );
  }
  if (!tendencyRows.length) {
    tendencyEl.innerHTML = '<div style="color:#444;font-size:13px;text-align:center;padding:1rem;">투표 데이터가 없어요</div>';
  } else {
    tendencyEl.innerHTML = tendencyRows.join('');
  }
  // AI 연애 유형 분석 로드
  loadPersonality();
}

async function saveImage() {
  var btn = document.querySelector('.btn-save');
  btn.textContent = '저장 중...';
  btn.style.opacity = '0.7';
  try {
    var shareArea = document.getElementById('share-area');
    shareArea.style.display = 'none';
    var target = document.getElementById('capture-area');
    var canvas = await html2canvas(target, {
      backgroundColor: '#000000',
      scale: 2,
      useCORS: true,
      logging: false,
    });
    shareArea.style.display = 'flex';
    var link = document.createElement('a');
    link.download = '남산엔테이블_모임결과.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    document.getElementById('share-area').style.display = 'flex';
    alert('이미지 저장에 실패했어요. 스크린샷을 이용해주세요.');
  } finally {
    btn.textContent = '📸 이미지 저장';
    btn.style.opacity = '1';
  }
}

async function shareResult() {
  var shareUrl = location.href;
  var shareText = '남산엔테이블 모임 결과 카드 💗\n' + shareUrl;
  if (navigator.share) {
    try { await navigator.share({ title: '남산엔테이블 모임 결과', text: shareText }); return; }
    catch(e) {}
  }
  if (navigator.clipboard) {
    await navigator.clipboard.writeText(shareUrl);
    alert('링크가 복사됐어요! 공유해보세요 💗');
  } else {
    alert(shareUrl);
  }
}

load();

// ══════════════════════════════════════════
// AI 연애 유형 분석
// ══════════════════════════════════════════

var _personalityLoaded = false;

async function loadPersonality() {
  if (_personalityLoaded) return;
  var loadingEl = document.getElementById('personality-loading');
  var resultEl  = document.getElementById('personality-result');
  var errorEl   = document.getElementById('personality-error');
  if (loadingEl) loadingEl.style.display = 'flex';
  if (resultEl)  resultEl.style.display  = 'none';
  if (errorEl)   errorEl.style.display   = 'none';
  try {
    var res = await fetch('/api/personality?room=' + encodeURIComponent(ROOM) + '&sub=' + encodeURIComponent(SUB));
    var data = await res.json();
    if (!data.ok) throw new Error(data.error || 'not_found');
    renderPersonality(data.personality);
    _personalityLoaded = true;
  } catch(e) {
    console.error('personality load error:', e);
    if (loadingEl) loadingEl.style.display = 'none';
    if (errorEl)   errorEl.style.display   = 'block';
  }
}

function renderPersonality(p) {
  var loadingEl = document.getElementById('personality-loading');
  var resultEl  = document.getElementById('personality-result');
  document.getElementById('personality-emoji').textContent     = p.type_emoji || '💘';
  document.getElementById('personality-type-name').textContent = p.type_name || '';
  document.getElementById('personality-subtitle').textContent  = p.type_subtitle || '';
  document.getElementById('personality-analysis').textContent  = p.analysis || '';
  document.getElementById('compatible-name').textContent       = p.compatible_type || '';
  var svgWrap = document.getElementById('personality-svg-wrap');
  if (svgWrap) svgWrap.innerHTML = buildPersonalitySVG(p);
  if (loadingEl) loadingEl.style.display = 'none';
  if (resultEl)  resultEl.style.display  = 'block';
}

function buildPersonalitySVG(p) {
  var name     = (p.type_name     || '').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  var subtitle = (p.type_subtitle || '').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  var emoji    = p.type_emoji || '💘';
  return '<svg width="180" height="320" viewBox="0 0 360 640" xmlns="http://www.w3.org/2000/svg">'
    + '<defs>'
    + '<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0a0a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>'
    + '<radialGradient id="glow" cx="60%" cy="35%" r="50%"><stop offset="0%" stop-color="#534AB7" stop-opacity="0.3"/><stop offset="100%" stop-color="#534AB7" stop-opacity="0"/></radialGradient>'
    + '</defs>'
    + '<rect width="360" height="640" rx="24" fill="url(#bg)"/>'
    + '<rect width="360" height="640" rx="24" fill="url(#glow)"/>'
    + '<rect width="360" height="3" rx="1.5" fill="#534AB7" opacity="0.8"/>'
    + '<text x="180" y="60" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#AFA9EC" font-weight="700" letter-spacing="2">💘 나의 연애 유형</text>'
    + '<text x="180" y="220" text-anchor="middle" font-size="120">' + emoji + '</text>'
    + '<text x="180" y="300" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#fff" font-weight="900">' + name + '</text>'
    + '<text x="180" y="335" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#AFA9EC">' + subtitle + '</text>'
    + '<line x1="80" y1="365" x2="280" y2="365" stroke="#534AB7" stroke-width="1" opacity="0.5"/>'
    + '<text x="180" y="610" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">남산엔테이블</text>'
    + '<text x="180" y="632" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#534AB7" font-weight="700">@ntable.namsan</text>'
    + '</svg>';
}

async function savePersonalityCard() {
  var svgEl = document.querySelector('#personality-svg-wrap svg');
  var btn = document.querySelector('.card-save-btn');
  if (btn) { btn.textContent = '저장 중...'; btn.style.opacity = '0.7'; }
  try {
    if (svgEl) {
      var canvas = document.createElement('canvas');
      canvas.width = 360; canvas.height = 640;
      var ctx = canvas.getContext('2d');
      var svgData = new XMLSerializer().serializeToString(svgEl);
      var img = new Image();
      var blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      await new Promise(function(resolve, reject) { img.onload=resolve; img.onerror=reject; img.src=url; });
      ctx.drawImage(img, 0, 0, 360, 640);
      URL.revokeObjectURL(url);
      var link = document.createElement('a');
      link.download = '남산엔테이블_연애유형.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } else { throw new Error('no svg'); }
  } catch(e) {
    try {
      var section = document.getElementById('personality-section');
      var c = await html2canvas(section, { backgroundColor:'#0a0a0a', scale:2, useCORS:true, logging:false,
        ignoreElements:function(el){ return el.classList.contains('no-capture'); } });
      var a = document.createElement('a');
      a.download = '남산엔테이블_연애유형.png'; a.href = c.toDataURL('image/png'); a.click();
    } catch(e2) { alert('이미지 저장에 실패했어요. 스크린샷을 이용해주세요.'); }
  } finally {
    if (btn) { btn.textContent = '📸 카드 저장'; btn.style.opacity = '1'; }
  }
}

async function sharePersonalityCard() {
  var typeName = document.getElementById('personality-type-name').textContent;
  var subtitle = document.getElementById('personality-subtitle').textContent;
  var shareText = '나의 연애 유형은 "' + typeName + '"
' + subtitle + '

🔍 남산엔테이블 연애 성향 분석
ns.ntable.kr';
  if (navigator.share) {
    try { await navigator.share({ title:'나의 연애 유형 — 남산엔테이블', text:shareText }); return; } catch(e) {}
  }
  if (navigator.clipboard) {
    await navigator.clipboard.writeText(shareText);
    alert('클립보드에 복사됐어요! 인스타 스토리에 붙여넣어 공유해보세요 💘');
  } else { alert(shareText); }
}
