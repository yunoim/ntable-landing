section_tag: How It Works

title: 한 번의 모임, 12개의 장치

body: "모임은 네 단계, 열두 개의 장치로 설계되어 있습니다.\n모임장은 '다음'만 누르면 됩니다."

steps:
  - phase: Step 01
    subphase: '입장 · 소개'
    title: QR 한 번으로 바로 입장
    body: '실명 대신 닉네임으로 입장합니다. 공개하기 싫은 정보(나이·지역·업종·인스타)는 건너뛰거나 카드에서 가릴 수 있습니다. 모임장이 참가자를 확인하고 모임을 시작합니다.'
    tags:
      - ① QR 자동 입장
      - ② 익명 닉네임
      - ③ 카드 정보 hide 옵션
      - 아바타 이모지 선택

  - phase: Step 02
    subphase: 성향 탐구
    title: 질문이 어색한 침묵을 지웁니다
    body: '모임장이 모임 성격에 맞는 유형을 고르고 1~15개 문항을 A/B 투표로 진행합니다. 문항마다 전체 결과가 바로 공개되고, 투표가 쌓일수록 나와 비슷한 답을 고른 사람이 먼저 보여요. 답이 바뀌면 언제든 다시 누를 수 있어요.'
    tags:
      - ④ 1~15문항 A/B 투표
      - ⑤ 실시간 호환도 순위
      - 언제든 다시 선택

  - phase: Step 03
    subphase: 자유대화
    title: 대화가 끊기지 않도록 앱이 도와줍니다
    body: 모임장이 모임 성격에 맞춰 도구를 켜둡니다. 타이머가 모두에게 동일하게 흐르고, 익명 채팅으로 말 못한 이야기를 보내고, 주제 카드로 새로운 대화 거리를 던집니다.
    tags:
      - ⑥ 자유대화 타이머
      - ⑦ 익명 채팅
      - ⑧ 주제 카드

  - phase: Step 04
    subphase: 마무리
    title: 오늘의 주인공과 인연을 데이터가 골라줍니다
    body: "'오늘의 주인공' 투표로 분위기를 이끈 참가자를 공개하고, 서로가 서로를 고른 짝을 찾아냅니다. 매칭 카드에는 닉네임·아바타·공통 답변이 함께 보여요. 소개팅 모임에선 양쪽이 인스타 아이디를 입력했을 때 그 자리에서 공개됩니다."
    tags:
      - ⑨ 오늘의 주인공 투표
      - ⑩ 상호 지명 매칭
      - ⑪ 인스타 상호 공개 [소개팅]
      - ⑫ AI 성향 카드
