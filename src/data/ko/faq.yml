eyebrow: 자주 묻는 질문

title:
  prefix: "처음이라면\n"
  emphasis: 이것부터 확인하세요

items:
  - q: 누구나 모임장이 될 수 있나요?
    a_html: '네, 누구나 가능합니다. 회원가입 없이 <strong>app.ntable.kr</strong>에 접속해서 모임 유형을 고르고 바로 QR을 받으세요. 모임장은 진행만 맡아도 되고, 본인도 참가자로 함께 들어올 수도 있습니다.'

  - q: 참가자는 어떻게 들어오나요?
    a_html: '모임장이 만든 QR 또는 링크를 찍거나 누르면 바로 입장돼요. 앱 설치·회원가입 없이 웹으로 바로 열립니다. QR을 직접 공유하기 어려우면 <strong>6자리 참여 코드</strong>만 전해줘도 돼요.'

  - q: 모임에서 입력한 정보는 어떻게 되나요?
    a_html: '닉네임·사진·프로필은 <strong>모임 안에서만</strong> 쓰이고, 모임이 끝나면 자동으로 정리됩니다. 결과 페이지 데이터는 최대 <strong>30일</strong> 동안 보관되고 그 이후엔 자동 파기돼요. 자세한 내용은 <a href="/privacy.html">개인정보처리방침</a>에서 확인할 수 있어요.'

  - q: 결과 페이지는 나중에도 다시 볼 수 있나요?
    a_html: '네, 모임이 끝나고 받은 결과 URL을 저장해두면 <strong>30일 동안</strong> 언제든 다시 열 수 있어요. 북마크하거나 본인에게 메시지로 보내두시면 편해요.'

  - q: 모임 중간에 사람이 추가로 들어와도 되나요?
    a_html: '됩니다. 모임이 시작된 뒤에도 QR이나 링크로 새 참가자가 들어올 수 있어요. 이미 지난 질문은 건너뛰고 현재 단계부터 함께 참여합니다.'

  - q: 참가비는 어떻게 받나요?
    a_html: 'ntable은 <strong>일체의 참가비를 받지 않습니다</strong>. 모임장이 참가비를 받고 싶다면 직접 정해서 직접 받으세요. 계좌이체·현금·다른 결제수단 모두 모임장 재량입니다.'

  - q: 모임에 맞는 질문은 누가 만드나요?
    a_html: '5종 모임 유형(둘이서·처음 만나는 사이·소개팅·플리 공유회·팀·회사)마다 질문 풀이 준비돼 있어요. 모임장은 원하는 문항 수(1~15개)를 정하거나 질문을 직접 고르고 편집할 수 있습니다.'
