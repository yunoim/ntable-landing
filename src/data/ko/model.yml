section_tag: Business Model

title:
  prefix: '지금 '
  emphasis: 전부 무료

body: 모든 기능을 인원 제한 없이 사용할 수 있습니다. 회원가입·결제정보·앱 설치 어떤 것도 요구하지 않습니다.

plan_card:
  eyebrow: '모임장·게스트 모두'
  title: 언제 어디서나 무료
  body: 참가비는 모임장이 직접 정하고 서비스를 거치지 않습니다. 게스트는 익명으로 참가하고, 모임장은 누구나 모임을 열 수 있습니다.
  features:
    - '🔒 익명 보장 (모임 안에서만 닉네임)'
    - '🛠 5종 모임 유형 + 진행 도구 풀세트'
    - '⏱️ 모임 종료 후 개인 데이터 자동 정리'

