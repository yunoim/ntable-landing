section_tag: Expansion

title: 같은 엔진, 모든 모임에

body:
  before: '지금 바로 쓸 수 있는 모임 유형 '
  highlight: 5종
  after: ' · 진행 구조는 모두 동일합니다. 모임장은 모임 성격에 맞춰 고르기만 하면 돼요.'

engine_hub:
  eyebrow: 공통 진행 구조
  title:
    prefix: '실시간 투표 · '
    emphasis: 성향 탐구
    suffix: ' · 자동 매칭'
  arrow: ↓ 모임에 맞는 질문만 바꿔 ↓

packs:
  - emoji: '👫'
    title: 둘이서
    body: 2인 전용 — 가벼운 대화부터 깊은 질문까지
  - emoji: '🤝'
    title: 처음 만나는 사이
    body: 아이스브레이커 — 5분 안에 어색함을 해소
  - emoji: '💘'
    title: '소개팅·연애'
    body: 밸런스 게임 + 상호 지명 매칭 + 인스타 상호 공개
  - emoji: '🎵'
    title: 나만의 플리 공유회
    body: '각자 15분 플리를 스피커로 공유 · BEST 플리 투표'
  - emoji: '💼'
    title: '팀·회사'
    body: '팀빌딩 — 업무 스타일 탐구·신입 OT·워크숍'

toolkit:
  title: 퍼실리테이션 툴킷 로드맵
  body: ntable은 모임 유형과 진행 도구 단위로 늘어납니다. 모임장이 모임 성격에 맞춰 고를 수 있는 도구 세트가 계속 추가돼요.
  items:
    - horizon: 단기
      title: '취미·스터디 팩'
      body: '독서·운동·여행·음식·영화·가족 모임 등 다양한 팩 추가'
      status: 개발 중
    - horizon: 단기
      title: 팀 랜덤 배정
      body: '참가자 성향·조건을 섞어 균형 있는 팀을 자동 편성'
      status: 개발 중
    - horizon: 중기
      title: 퀴즈 · OX 게임
      body: '실시간 정답 집계와 순위 — 학습·팀빌딩 범용'
      status: 예정
    - horizon: 중기
      title: 해외 확장
      body: '언어 세트만 바꾸면 동일한 엔진 — 영어·일본어 우선'
      status: 예정
