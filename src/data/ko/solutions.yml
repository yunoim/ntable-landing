section_tag: Solution

title:
  prefix: '처음이어도 모임장이 되는 '
  emphasis: 비밀

body: "진행 전체를 앱이 대신 맡아요.\n모임장은 '다음' 버튼만 누르면 소개부터 매칭, 발표까지 자연스럽게 이어집니다."

steps:
  - num: '01'
    title: "모임장은 '다음'만"
    body: 모임의 흐름은 앱에 이미 설계돼 있습니다. 모임장은 타이밍만 잡으면 됩니다.
  - num: '02'
    title: 말 없이도 섞인다
    body: 5종 팩 중 모임 성격대로 고르기만 하면 끝. 말수가 적어도, 선택 하나로 자기 이야기를 하게 됩니다.
  - num: '03'
    title: 주관 없이 매칭
    body: 투표 결과로 공통점이 많은 짝을 실시간 계산해 공개합니다. 모임장의 주관이 끼어들 틈이 없습니다.
  - num: '04'
    title: 누구나 모임장이 된다
    body: 처음 열어도, 말주변이 없어도 같은 퀄리티. 사람이 아닌 구조가 모임을 책임집니다.

