section_tag: Problem

title:
  prefix: "재밌는 모임은 사람이 아니라\n"
  emphasis: 구조
  suffix: 가 만듭니다

body: 모임의 재미는 모임장 한 사람의 역량에 좌우된다. ntable은 이 문제를 사람이 아닌 구조로 풉니다.

cards:
  - icon: '🤹'
    title: 모임장 의존
    body: 재밌는 모임은 결국 능숙한 모임장 한 명에서 나옵니다. 그런 사람은 드물고, 가르쳐 만드는 것도 쉽지 않습니다.
    example: '😓 "지난번엔 그렇게 재밌었는데, 오늘은 왜 이렇게 어색하지."'
  - icon: '🤫'
    title: 말 없는 사람은 늘 외곽
    body: 인구의 절반이 내향형입니다. 그런데 대부분의 모임은 말 많은 사람 중심으로 흘러가고, 나머지는 구석에서 시간만 보내고 옵니다.
    example: '😓 "말 많은 사람만 기억에 남고, 나는 그냥 앉아만 있다가 왔어."'
  - icon: '🔗'
    title: 사람에 의존하는 구조
    body: 좋은 모임을 만들려면 좋은 모임장이 필요합니다. 사람에 기대는 운영은 품질도, 규모도 키울 수 없습니다.
    example: '😓 "에이스 모임장 한 명이 그만두면, 모임은 거기서 끝이다."'
